<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>플랜 안내 | 줄연결암기</title>

  <style>
    body{
      font-family:system-ui, Apple SD Gothic Neo, Malgun Gothic, sans-serif;
      margin:24px;
      max-width:1000px;
    }

    h1{
      font-size:26px;
      margin-bottom:6px;
    }

    .lead{
      font-size:14px;
      color:#555;
      margin-bottom:20px;
    }

    .btn{
      display:inline-block;
      padding:10px 14px;
      border:1px solid #222;
      border-radius:10px;
      text-decoration:none;
      color:#111;
      margin-top:6px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .card{
      border:1px solid #222;
      border-radius:10px;
      padding:16px;
      text-align:center;
    }

    .card h2{
      margin:0 0 6px;
    }

    .price{
      font-size:14px;
      color:#444;
      margin-top:8px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }

    th{
      background:#f7f7f7;
    }

    .footer{
      margin-top:50px;
      border-top:1px solid #ddd;
      padding-top:16px;
      font-size:14px;
      color:#555;
    }

    .footer a{
      color:#1565c0;
      text-decoration:none;
    }
  </style>
</head>
